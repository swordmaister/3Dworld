<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D HTML Player</title>
  <style>
    /* 画面全体を覆うレイアウト */
    body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; }
    
    /* 上部の操作メニュー */
    #toolbar { padding: 10px; background: #333; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    select, button, input { padding: 5px 10px; font-size: 14px; }
    
    /* 3Dを表示するエリア */
    #viewer-container { flex: 1; position: relative; width: 100%; }
    
    /* Three.jsやA-Frameを表示するiframe */
    .viewer-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #000; }
  </style>
</head>
<body>

  <div id="toolbar">
    <select id="fileSelect">
      <option value="">Googleドライブと通信中...</option>
    </select>
    <button id="btnPlay">▶ 表示</button>
  </div>

  <div id="viewer-container">
    <iframe id="iframeA" class="viewer-frame"></iframe>
  </div>

  <script>
    // あなたのGASのURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzj54N3di_L0kSqrqSo0M8XCWbboID34OB2FcPChr9ss1SPp5NRbMfDbKPH2PezsEhzcA/exec";

    // 起動時にファイルリストを取得する関数
    async function fetchFileList() {
      try {
        const response = await fetch(GAS_URL);
        const files = await response.json();
        
        const select = document.getElementById('fileSelect');
        select.innerHTML = ''; 
        
        if (files.length === 0) {
          select.innerHTML = '<option value="">HTMLファイルが見つかりません</option>';
          return;
        }

        files.forEach(file => {
          const option = document.createElement('option');
          option.value = file.id; 
          option.text = file.name; 
          select.appendChild(option);
        });

      } catch (error) {
        console.error("エラー:", error);
        document.getElementById('fileSelect').innerHTML = '<option value="">読み込みエラー</option>';
      }
    }

    // 「▶ 表示」ボタンが押されたときの処理
    document.getElementById('btnPlay').addEventListener('click', async () => {
      const select = document.getElementById('fileSelect');
      const fileId = select.value;
      if (!fileId) {
        alert("ファイルが選択されていません");
        return;
      }

      const btn = document.getElementById('btnPlay');
      const originalText = btn.innerText;
      btn.innerText = "⏳ 読み込み中...";
      btn.disabled = true;

      try {
        // GASからファイルの中身を取得
        const response = await fetch(`${GAS_URL}?fileId=${fileId}`);
        const data = await response.json();

        if (data.success) {
          // iframeの中に取得したHTMLコードを書き込む
          const iframe = document.getElementById('iframeA');
          const doc = iframe.contentWindow.document;
          doc.open();
          doc.write(data.html);
          doc.close();
        } else {
          alert("ファイルの取得に失敗しました: " + data.message);
        }
      } catch (error) {
        console.error("エラー:", error);
        alert("通信エラーが発生しました");
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });

    // 画面が読み込まれたら実行
    window.onload = fetchFileList;
  </script>
</body>
</html>
