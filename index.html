<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D HTML Player & Editor</title>
  <style>
    /* 全体のレイアウト */
    body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }
    
    /* 上部のヘッダー */
    #header { padding: 10px; background: #222; display: flex; align-items: center; z-index: 100; position: relative; }
    #menuToggle { background: #444; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-size: 16px; }
    #menuToggle:hover { background: #555; }
    
    /* 操作メニュー */
    #toolbar { padding: 10px; background: #333; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #444; transition: all 0.3s; z-index: 90; position: relative; }
    .hidden { display: none !important; }
    
    select, button, input { padding: 8px 12px; font-size: 14px; border-radius: 4px; border: none; cursor: pointer; box-sizing: border-box; }
    select, input[type="text"] { background: #fff; color: #000; }
    button { background: #007bff; color: white; font-weight: bold; }
    button:hover { background: #0056b3; }
    button:disabled { background: #555; cursor: not-allowed; }

    /* エディタ周りのレイアウト */
    .editor-container { flex-basis: 100%; display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }
    #codeEditor { width: 100%; height: 120px; padding: 10px; font-family: monospace; font-size: 13px; background: #111; color: #eee; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; resize: vertical; }
    .save-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 5px; }

    /* ボタンの色分け */
    #btnCopy { background: #6c757d; } #btnCopy:hover { background: #5a6268; }
    #btnPreviewEditor { background: #17a2b8; } #btnPreviewEditor:hover { background: #138496; }
    #btnOverwrite { background: #dc3545; } #btnOverwrite:hover { background: #c82333; }
    #btnSaveAs { background: #ffc107; color: #000; } #btnSaveAs:hover { background: #e0a800; }

    /* 3D表示エリア */
    #viewer-container { flex: 1; position: relative; width: 100%; }
    .viewer-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #000; }

    /* コントロールボタン */
    #touchControls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
    .ctrl-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white; padding: 15px 20px; border-radius: 50px; font-size: 16px; backdrop-filter: blur(5px); transition: 0.2s; }
    .ctrl-btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.95); }
  </style>
</head>
<body>

  <div id="header">
    <button id="menuToggle">☰ メニューを開閉</button>
  </div>

  <div id="toolbar">
    <select id="fileSelect">
      <option value="">通信中...</option>
    </select>
    <button id="btnPlay">▶ ドライブから表示</button>
    <button id="btnCopy" disabled>📋 コピー</button>

    <div class="editor-container">
      <textarea id="codeEditor" placeholder="ここに生成されたコードを貼り付けるか、直接編集できます..."></textarea>
    </div>

    <div class="save-controls">
      <button id="btnPreviewEditor">🔄 エディタのコードをプレビュー</button>
      
      <select id="extSelect">
        <option value=".html">.html</option>
        <option value=".js">.js</option>
        <option value=".txt">.txt</option>
        <option value="manual">手入力...</option>
      </select>
      <input type="text" id="customExt" class="hidden" placeholder="例: .json" style="width: 80px;">

      <button id="btnOverwrite" disabled>💾 エディタの内容で上書き保存</button>
      <button id="btnSaveAs">📝 新規保存</button>
    </div>
  </div>

  <div id="viewer-container">
    <iframe id="iframeA" class="viewer-frame" allow="xr-spatial-tracking; fullscreen; accelerometer; gyroscope; magnetometer; camera; microphone"></iframe>
    
    <div id="touchControls">
      <button id="btnUp" class="ctrl-btn">▲ 上昇</button>
      <button id="btnDown" class="ctrl-btn">▼ 下降</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzj54N3di_L0kSqrqSo0M8XCWbboID34OB2FcPChr9ss1SPp5NRbMfDbKPH2PezsEhzcA/exec";

    let currentFileName = "";
    const fileSelect = document.getElementById('fileSelect');
    const codeEditor = document.getElementById('codeEditor');
    const extSelect = document.getElementById('extSelect');
    const customExt = document.getElementById('customExt');

    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('toolbar').classList.toggle('hidden');
    });

    extSelect.addEventListener('change', (e) => {
      if (e.target.value === 'manual') customExt.classList.remove('hidden');
      else customExt.classList.add('hidden');
    });

    async function fetchFileList() {
      try {
        const response = await fetch(GAS_URL);
        const files = await response.json();
        
        fileSelect.innerHTML = ''; 
        if (files.length === 0) {
          fileSelect.innerHTML = '<option value="">ファイルが見つかりません</option>';
          return;
        }

        files.forEach(file => {
          const option = document.createElement('option');
          option.value = file.id; 
          option.text = file.name; 
          fileSelect.appendChild(option);
        });
      } catch (error) {
        fileSelect.innerHTML = '<option value="">読み込みエラー</option>';
      }
    }

    // ★重要: iframeへの描画をBlob URL方式に変更★
    function renderToIframe(htmlCode) {
      const iframe = document.getElementById('iframeA');
      
      // 前回のBlobURLが残っていればメモリから解放する
      if (iframe.src && iframe.src.startsWith('blob:')) {
        URL.revokeObjectURL(iframe.src);
      }
      
      // HTML文字列を「text/html」型のBlob（擬似ファイル）に変換
      const blob = new Blob([htmlCode], { type: 'text/html' });
      // 生成したBlobのURLをiframeにセットして本物のファイルのように読み込ませる
      iframe.src = URL.createObjectURL(blob);
    }

    document.getElementById('btnPlay').addEventListener('click', async () => {
      const fileId = fileSelect.value;
      if (!fileId) return alert("ファイルを選択してください");

      currentFileName = fileSelect.options[fileSelect.selectedIndex].text;
      const btn = document.getElementById('btnPlay');
      btn.innerText = "⏳ 読み込み中...";
      btn.disabled = true;

      try {
        const response = await fetch(`${GAS_URL}?fileId=${fileId}`);
        const data = await response.json();

        if (data.success) {
          codeEditor.value = data.html;
          renderToIframe(data.html); // Blob URL方式でレンダリング
          document.getElementById('btnCopy').disabled = false;
          document.getElementById('btnOverwrite').disabled = false;
        } else {
          alert("エラー: " + data.message);
        }
      } catch (error) {
        alert("通信エラーが発生しました");
      } finally {
        btn.innerText = "▶ ドライブから表示";
        btn.disabled = false;
      }
    });

    document.getElementById('btnPreviewEditor').addEventListener('click', () => {
      if (!codeEditor.value) return alert("エディタにコードがありません");
      renderToIframe(codeEditor.value); // Blob URL方式でレンダリング
    });

    document.getElementById('btnCopy').addEventListener('click', () => {
      if (!codeEditor.value) return;
      navigator.clipboard.writeText(codeEditor.value).then(() => {
        alert("コードをコピーしました！");
      });
    });

    document.getElementById('btnOverwrite').addEventListener('click', async () => {
      if (!codeEditor.value || !currentFileName) return;
      if (!confirm(`「${currentFileName}」をエディタの内容で上書き保存しますか？`)) return;
      await saveToDrive(currentFileName, codeEditor.value, "update");
    });

    document.getElementById('btnSaveAs').addEventListener('click', async () => {
      if (!codeEditor.value) return alert("保存する内容がエディタにありません");
      
      let baseNameSuggestion = currentFileName ? currentFileName.split('.')[0] : "new_scene";
      let baseName = prompt("新しいファイル名を入力してください。\n（※拡張子は自動で付与されます）", baseNameSuggestion);
      if (!baseName) return; 

      let ext = extSelect.value;
      if (ext === 'manual') {
        ext = customExt.value.trim();
        if (!ext) return alert("拡張子が入力されていません");
        if (!ext.startsWith('.')) ext = '.' + ext;
      }

      if (baseName.endsWith(ext)) baseName = baseName.slice(0, -ext.length);
      const finalFileName = baseName + ext;
      await saveToDrive(finalFileName, codeEditor.value, "create");
      fetchFileList();
    });

    async function saveToDrive(fileName, content, action) {
      try {
        const payload = { action: action, fileName: fileName, content: content };
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        if (result.success) {
          alert("保存成功: " + result.message);
          currentFileName = fileName; 
          document.getElementById('btnOverwrite').disabled = false;
        } else {
          alert("保存エラー: " + result.message);
        }
      } catch (error) {
        alert("保存のための通信に失敗しました。");
      }
    }

    document.getElementById('btnUp').addEventListener('pointerdown', () => console.log("上昇"));
    document.getElementById('btnDown').addEventListener('pointerdown', () => console.log("下降"));

    window.onload = fetchFileList;
  </script>
</body>
</html>
