<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>3D HTML Player & AI Editor Pro v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; height: 100vh;
      background: #1a1a2e; color: #e0e0e0; overflow: hidden;
    }

    /* 🍏 文字選択・長押しメニュー・ダブルタップズームを完全に防止 */
    .overlay-btn, .ctrl-btn, #overlay-ui, .file-tab, button, select, #touchControls, .move-controls {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
    }

    /* ヘッダー・ツールバー */
    #header { padding: 8px 14px; background: #16213e; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    #header h1 { font-size: 15px; color: #e94560; font-weight: 700; }
    #menuToggle { background: #0f3460; color: #e0e0e0; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #toolbar { background: #16213e; padding: 10px 14px; border-bottom: 1px solid #0f3460; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; transition: all 0.3s; }
    #toolbar.hidden { display: none; }
    .toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    select, textarea { background: #0f3460; color: #e0e0e0; border: 1px solid #e9456055; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
    button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.15s; }
    .btn-primary { background: #e94560; color: #fff; } .btn-secondary { background: #0f3460; color: #e0e0e0; border: 1px solid #e9456055; }
    .btn-success { background: #28a745; color: #fff; } .btn-fs { background: #6f42c1; color: #fff; } .btn-drive { background: #4285F4; color: #fff; }
    .btn-ai { background: #8e44ad; color: #fff; width: 100%; padding: 8px; margin-top: 5px; font-weight: bold; }
    button:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ファイルタブ */
    #fileTabs { display: flex; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid #0f3460; padding: 0 14px; background: #16213e; flex-shrink: 0; min-height: 34px; align-items: flex-end; }
    .file-tab { padding: 5px 12px; border-radius: 4px 4px 0 0; background: #0f3460; color: #aaa; cursor: pointer; font-size: 12px; border: 1px solid #0f3460; border-bottom: none; display: flex; align-items: center; gap: 6px; }
    .file-tab.active { background: #1a1a2e; color: #e94560; border-color: #e94560; }
    .file-tab .close-tab { color: #888; font-size: 14px; line-height: 1; cursor: pointer; }

    /* メインエリア */
    #main { flex: 1; display: flex; overflow: hidden; }
    
    /* エディタ */
    #editor-panel { width: 40%; min-width: 250px; display: flex; flex-direction: column; border-right: 2px solid #e94560; }
    #editor-panel.hidden { display: none; }
    #editorLabel { padding: 4px 10px; background: #0f3460; font-size: 11px; color: #aaa; display: flex; justify-content: space-between; }
    #editorLabel span { color: #e94560; font-weight: 700; }
    #codeEditor { flex: 1; padding: 12px; font-family: monospace; font-size: 13px; background: #0a0e1a; color: #e0e0e0; border: none; outline: none; white-space: pre; overflow: auto; }
    
    /* AIエリア */
    #ai-panel { padding: 10px; background: #16213e; border-top: 1px solid #e9456055; flex-shrink: 0; }
    .ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    #aiPrompt { width: 100%; height: 60px; resize: vertical; font-size: 12px; background: #0a0e1a; }

    /* ビューワー（ダブルバッファリング） */
    #viewer-container { flex: 1; position: relative; background: #000; overflow: hidden; }
    
    /* iPhone対応 疑似フルスクリーンクラス */
    #viewer-container.pseudo-fullscreen { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; }
    
    .viewer-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.6s ease-in-out; pointer-events: none; background: transparent; }
    .viewer-frame.active { opacity: 1; pointer-events: auto; z-index: 10; }
    #viewer-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; z-index: 5; }

    /* オーバーレイUI */
    #overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 50; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
    
    /* 上部：タイトルバーと表示切り替えボタン */
    .overlay-top { display: flex; align-items: center; gap: 8px; pointer-events: auto; }
    .overlay-title { background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px; font-size: 13px; border: 1px solid #e9456055; color: #fff; font-weight: bold; transition: opacity 0.3s; }
    
    /* 下部：コントロールエリア */
    .overlay-bottom { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto; width: 100%; }
    
    /* 左下：再生系 ＋ 空間移動十字キー */
    .overlay-left-controls { display: flex; flex-direction: column; gap: 12px; }
    .playback-controls { display: flex; gap: 10px; }
    
    /* 🎮 空間自由移動用 十字キーコントローラー */
    .move-controls {
      display: grid;
      grid-template-columns: repeat(3, 46px);
      grid-template-rows: repeat(3, 46px);
      gap: 6px;
      background: rgba(0, 0, 0, 0.4);
      padding: 6px;
      border-radius: 12px;
      border: 1px solid #0f3460;
      width: fit-content;
    }
    
    .overlay-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid #e9456077;
      color: white;
      padding: 12px 18px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: bold;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .overlay-btn:active { background: rgba(233, 69, 96, 0.8); transform: scale(0.92); }
    .overlay-btn.active-mode { background: rgba(40, 167, 69, 0.85); border-color: #28a745; } 
    
    .move-btn { border-radius: 8px; padding: 0; font-size: 16px; }
    .move-label { display: flex; align-items: center; justify-content: center; color: #e94560; font-size: 9px; font-weight: bold; }

    /* 右下：カメラ上下コントローラー */
    .camera-controls { display: flex; flex-direction: column; gap: 10px; }

    /* ステータスバー */
    #statusBar { padding: 3px 14px; background: #0f3460; font-size: 11px; color: #888; display: flex; justify-content: space-between; flex-shrink: 0; }
    .status-ok { color: #28a745; } .status-err { color: #e94560; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="header">
  <h1>🎮 3D Viewer & AI Editor Pro v2</h1>
  <button id="menuToggle">☰ メニュー</button>
  <button class="btn-secondary" id="btnToggleEditor">◧ エディタ切替</button>
  <button class="btn-fs" id="btnFullscreen">⛶ フルスクリーン</button>
</div>

<div id="toolbar">
  <div class="toolbar-row">
    <select id="sampleSelect">
      <option value="">── サンプルを選択 ──</option>
      <option value="threejs_basic">Three.js: 回転キューブ</option>
      <option value="aframe_scene">A-Frame: VRシーン</option>
    </select>
    <button class="btn-primary" id="btnLoadSample">▶ ロード</button>
    <button class="btn-info" id="btnPreview">🔄 プレビュー更新</button>
    <button class="btn-secondary" id="btnCopy" disabled>📋 コピー</button>
    <button class="btn-secondary" id="btnNewFile">＋ 空ファイル作成</button>
    <button class="btn-success" id="btnSaveNew">📁 ローカル新規保存</button>
    <button class="btn-secondary" id="btnOverwrite" disabled>💾 ローカル上書き</button>
  </div>
  <div class="toolbar-row" style="padding-top: 5px; border-top: 1px dashed #0f3460;">
    <button class="btn-drive" id="btnLoadDriveList">☁️ ドライブ読込</button>
    <select id="driveFileSelect" style="min-width: 200px;"><option value="">ドライブ未読込</option></select>
    <button class="btn-drive" id="btnLoadDrive">☁️ 開く</button>
    <button class="btn-drive" id="btnSaveDrive" disabled>☁️ 保存</button>
  </div>
</div>

<div id="fileTabs"></div>

<div id="main">
  <div id="editor-panel">
    <div id="editorLabel"><span id="currentFileLabel">untitled.html</span><span id="charCount">0 文字</span></div>
    <textarea id="codeEditor" placeholder="コードを入力..."></textarea>
    
    <div id="ai-panel">
      <div class="ai-header">
        <span style="font-size:11px; color:#aaa;">🤖 Gemini API 連携</span>
        <button class="btn-secondary" id="btnApiKey" style="padding:2px 8px; font-size:11px;">🔑 APIキー設定</button>
      </div>
      <textarea id="aiPrompt" placeholder="【変更指示】例: 街全体を夕暮れのライティングにして、空を飛ぶヘリコプターのスピードを少し速めて。"></textarea>
      <button class="btn-ai" id="btnAiGenerate">✨ AIコード生成 / 実行</button>
    </div>
  </div>

  <div id="viewer-container">
    <div id="viewer-placeholder">ドライブからロードするか、コードを入力して「プレビュー更新」</div>
    <iframe id="iframeA" class="viewer-frame" allow="xr-spatial-tracking; fullscreen; accelerometer; gyroscope; magnetometer; camera; microphone"></iframe>
    <iframe id="iframeB" class="viewer-frame" allow="xr-spatial-tracking; fullscreen; accelerometer; gyroscope; magnetometer; camera; microphone"></iframe>
    
    <div id="overlay-ui">
      <div class="overlay-top">
        <div id="osd-filename" class="overlay-title">untitled.html</div>
        <button id="btnToggleTitle" class="overlay-btn" style="padding: 6px 12px; border-radius: 20px; font-size:12px;">👁️</button>
      </div>
      
      <div class="overlay-bottom">
        
        <div class="overlay-left-controls">
          <div class="playback-controls">
            <button id="btnAutoPlay" class="overlay-btn">🔄 オートプレイ</button>
            <button id="btnNext" class="overlay-btn">⏭ 次へ</button>
          </div>
          
          <div class="move-controls">
            <div></div>
            <button id="btnForward" class="overlay-btn move-btn">▲</button>
            <div></div>
            <button id="btnLeft" class="overlay-btn move-btn">◀</button>
            <div class="move-label">MOVE</div>
            <button id="btnRight" class="overlay-btn move-btn">▶</button>
            <div></div>
            <button id="btnBackward" class="overlay-btn move-btn">▼</button>
          </div>
        </div>
        
        <div class="camera-controls">
          <button id="btnUp" class="overlay-btn" style="border-radius: 20px 20px 8px 8px; height: 55px;">▲ 上昇</button>
          <button id="btnDown" class="overlay-btn" style="border-radius: 8px 8px 20px 20px; height: 55px;">▼ 下降</button>
        </div>
        
      </div>
    </div>
  </div>
</div>

<div id="statusBar">
  <div><span id="statusMsg">準備完了</span> | <span id="fileCountMsg">ローカルファイル: 0</span></div>
  <div id="driveStatus">GAS未通信</div>
</div>

<script>
// =============================================
//  システム設定・状態管理
// =============================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzj54N3di_L0kSqrqSo0M8XCWbboID34OB2FcPChr9ss1SPp5NRbMfDbKPH2PezsEhzcA/exec";
const STORAGE_KEY = 'viewer_files_v1';
const API_KEY_STORAGE = 'gemini_api_key';

let files = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let activeFile = null;

let driveFiles = [];
let currentIndex = -1;
let isAutoPlay = false;
let autoPlayTimer = null;
const AUTOPLAY_INTERVAL = 15000;
let activeIframeId = 'iframeA';

// 押しっぱなし移動用のタイマーオブジェクト
let moveTimers = {};

// =============================================
//  ユーティリティ＆タブ管理
// =============================================
function setStatus(msg, type = '') { document.getElementById('statusMsg').textContent = msg; document.getElementById('statusMsg').className = type; }
function setDriveStatus(msg) { document.getElementById('driveStatus').textContent = msg; }
function updateCharCount() { document.getElementById('charCount').textContent = `${document.getElementById('codeEditor').value.length.toLocaleString()} 文字`; }

function saveStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
  document.getElementById('fileCountMsg').textContent = `ローカルファイル: ${Object.keys(files).length}`;
}

function renderTabs() {
  const container = document.getElementById('fileTabs');
  container.innerHTML = '';
  Object.keys(files).forEach(name => {
    const tab = document.createElement('div');
    tab.className = 'file-tab' + (name === activeFile ? ' active' : '');
    tab.innerHTML = `<span>${name}</span><span class="close-tab">✕</span>`;
    tab.querySelector('span:first-child').addEventListener('click', () => switchFile(name));
    tab.querySelector('.close-tab').addEventListener('click', (e) => { e.stopPropagation(); deleteFile(name); });
    container.appendChild(tab);
  });
}

function switchFile(name) {
  if (activeFile && files[activeFile] !== undefined) { files[activeFile] = document.getElementById('codeEditor').value; saveStorage(); }
  activeFile = name;
  document.getElementById('codeEditor').value = files[name] || '';
  document.getElementById('currentFileLabel').textContent = name;
  document.getElementById('osd-filename').innerText = name;
  document.getElementById('btnOverwrite').disabled = false;
  document.getElementById('btnSaveDrive').disabled = false;
  document.getElementById('btnCopy').disabled = false;
  updateCharCount(); renderTabs(); setStatus(`「${name}」を開きました`);
}

function deleteFile(name) {
  if (!confirm(`「${name}」をローカルから削除しますか？`)) return;
  delete files[name]; saveStorage();
  if (activeFile === name) {
    activeFile = null; document.getElementById('codeEditor').value = '';
    document.getElementById('currentFileLabel').textContent = 'untitled.html';
    document.getElementById('osd-filename').innerText = '---';
    ['btnOverwrite', 'btnSaveDrive', 'btnCopy'].forEach(id => document.getElementById(id).disabled = true);
  }
  renderTabs();
}

function saveNewFile(name, content) { files[name] = content; saveStorage(); renderTabs(); switchFile(name); }

// =============================================
//  ダブルバッファ レンダリング (移動コマンド注入)
// =============================================
function renderToIframe(html, customName = null) {
  document.getElementById('osd-filename').innerText = customName || activeFile || "untitled.html";
  
  // ★ Three.js, A-Frame, Babylon.js の全移動に対応する高機能レシーバー ★
  const injectionScript = `
  <script>
    window.addEventListener('message', (e) => {
      const action = e.data.action;
      
      // 1. A-Frame対応
      const afCam = document.querySelector('a-camera, [camera]');
      if (afCam && afCam.object3D) {
        const obj = afCam.object3D;
        const dist = 0.4;
        if (action === 'moveUp') obj.position.y += dist;
        if (action === 'moveDown') obj.position.y -= dist;
        if (action === 'moveForward') obj.translateZ(-dist);
        if (action === 'moveBackward') obj.translateZ(dist);
        if (action === 'moveLeft') obj.translateX(-dist);
        if (action === 'moveRight') obj.translateX(dist);
        return;
      }
      
      // 2. Three.js対応
      if (window.camera && window.camera.position) {
        const cam = window.camera;
        const dist = 1.8;
        if (action === 'moveUp') cam.position.y += dist;
        if (action === 'moveDown') cam.position.y -= dist;
        if (action === 'moveForward') cam.translateZ(-dist);
        if (action === 'moveBackward') cam.translateZ(dist);
        if (action === 'moveLeft') cam.translateX(-dist);
        if (action === 'moveRight') cam.translateX(dist);
        return;
      }

      // 3. Babylon.js対応
      if (window.BABYLON) {
        try {
          const instances = window.BABYLON.Engine.Instances;
          const scene = (instances && instances.length > 0 && instances[0].scenes[0]) || window.scene;
          if (scene && scene.activeCamera) {
            const cam = scene.activeCamera;
            const dist = 0.6;
            
            if (cam.getDirection) {
              if (action === 'moveUp') cam.position.y += dist;
              if (action === 'moveDown') cam.position.y -= dist;
              const forward = cam.getDirection(new window.BABYLON.Vector3(0, 0, 1));
              const right = cam.getDirection(new window.BABYLON.Vector3(1, 0, 0));
              if (action === 'moveForward') cam.position.addInPlace(forward.scale(dist));
              if (action === 'moveBackward') cam.position.addInPlace(forward.scale(-dist));
              if (action === 'moveLeft') cam.position.addInPlace(right.scale(-dist));
              if (action === 'moveRight') cam.position.addInPlace(right.scale(dist));
            } else if (cam.target) {
              if (action === 'moveUp') cam.target.y += dist;
              if (action === 'moveDown') cam.target.y -= dist;
              const diff = cam.target.subtract(cam.position);
              diff.y = 0; 
              const forward = diff.normalize();
              const right = window.BABYLON.Vector3.Cross(forward, cam.upVector || new window.BABYLON.Vector3(0,1,0)).normalize();
              if (action === 'moveForward') { cam.target.addInPlace(forward.scale(dist)); cam.position.addInPlace(forward.scale(dist)); }
              if (action === 'moveBackward') { cam.target.addInPlace(forward.scale(-dist)); cam.position.addInPlace(forward.scale(-dist)); }
              if (action === 'moveLeft') { cam.target.addInPlace(right.scale(-dist)); cam.position.addInPlace(right.scale(-dist)); }
              if (action === 'moveRight') { cam.target.addInPlace(right.scale(dist)); cam.position.addInPlace(right.scale(dist)); }
            }
          }
        } catch(err) { console.error("Babylon操作エラー:", err); }
      }
    });
  <\/script></body>`;

  const modifiedHtml = html.replace(/<\/body>/i, injectionScript);
  const nextIframeId = (activeIframeId === 'iframeA') ? 'iframeB' : 'iframeA';
  const nextIframe = document.getElementById(nextIframeId);
  const currentIframe = document.getElementById(activeIframeId);

  if (nextIframe.src && nextIframe.src.startsWith('blob:')) URL.revokeObjectURL(nextIframe.src);
  nextIframe.src = URL.createObjectURL(new Blob([modifiedHtml], { type: 'text/html' }));

  nextIframe.onload = () => {
    document.getElementById('viewer-placeholder').classList.add('hidden');
    nextIframe.classList.add('active'); currentIframe.classList.remove('active');
    activeIframeId = nextIframeId;
  };
}

// =============================================
//  タイトルの表示・非表示切り替え
// =============================================
document.getElementById('btnToggleTitle').addEventListener('click', () => {
  const titleEl = document.getElementById('osd-filename');
  const btn = document.getElementById('btnToggleTitle');
  if (titleEl.style.opacity === '0') {
    titleEl.style.opacity = '1';
    btn.innerText = "👁️";
    btn.style.opacity = "1";
  } else {
    titleEl.style.opacity = '0';
    btn.innerText = "🙈";
    btn.style.opacity = "0.5";
  }
});

// =============================================
//  🍎 iPhone対応 フルスクリーン・疑似切り替え
// =============================================
document.getElementById('btnFullscreen').addEventListener('click', () => {
  const viewer = document.getElementById('viewer-container');
  if (document.fullscreenEnabled || viewer.webkitRequestFullscreen) {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (viewer.requestFullscreen) viewer.requestFullscreen();
      else if (viewer.webkitRequestFullscreen) viewer.webkitRequestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  } else {
    viewer.classList.toggle('pseudo-fullscreen');
    document.getElementById('btnFullscreen').innerText = viewer.classList.contains('pseudo-fullscreen') ? "⛶ 元に戻す" : "⛶ フルスクリーン";
  }
});

// =============================================
//  ✨ Gemini API (ローカルダイレクト)
// =============================================
document.getElementById('btnApiKey').addEventListener('click', () => {
  const currentKey = localStorage.getItem(API_KEY_STORAGE) || "";
  const newKey = prompt("Gemini APIキーを入力してください。\n※ブラウザに安全に保存されます。", currentKey);
  if (newKey !== null) { localStorage.setItem(API_KEY_STORAGE, newKey.trim()); setStatus("APIキーを保存しました", "status-ok"); }
});

document.getElementById('btnAiGenerate').addEventListener('click', async () => {
  const apiKey = localStorage.getItem(API_KEY_STORAGE);
  if (!apiKey) return alert("「🔑 APIキー設定」からAPIキーを登録してください。");
  const promptText = document.getElementById('aiPrompt').value;
  const currentCode = document.getElementById('codeEditor').value;
  if (!promptText.trim() || !currentCode.trim()) return alert("指示または対象コードが空です。");

  const btn = document.getElementById('btnAiGenerate');
  btn.innerText = "⏳ AI空間設計中..."; btn.disabled = true;

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`;
    const payload = {
      contents: [{ role: "user", parts: [{ text: `以下の3Dコードを変更指示に従って完全に改修してください。\n\n【指示】\n${promptText}\n\n【現在のコード】\n${currentCode}` }] }],
      systemInstruction: { parts: [{ text: "あなたは世界最高峰のWeb3Dプログラマーです。修正要求を満たした【HTMLコード全体】のみを返してください。不要な解説や\`\`\`htmlのようなマークダウン装飾は一切省いて出力してください。" }] },
      generationConfig: { temperature: 0.2 }
    };
    const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error("APIエラー");
    const data = await res.json();
    let newCode = data.candidates[0].content.parts[0].text;
    newCode = newCode.replace(/^```(html)?\n?/, '').replace(/\n?```$/, '').trim();

    document.getElementById('codeEditor').value = newCode;
    if (activeFile) { files[activeFile] = newCode; saveStorage(); }
    updateCharCount(); renderToIframe(newCode); setStatus("AI空間を構築完了！", "status-ok");
  } catch (e) { alert("AI実行エラー: " + e.message); } finally { btn.innerText = "✨ AIコード生成 / 実行"; btn.disabled = false; }
});

// =============================================
//  🕹️ タッチ操作・押しっぱなし自由移動ロジック
// =============================================
function sendCam(action) {
  const iframe = document.getElementById(activeIframeId);
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage({ action }, '*');
  }
}

function startMoving(action) {
  if (moveTimers[action]) return;
  sendCam(action); 
  moveTimers[action] = setInterval(() => sendCam(action), 40); 
}

function stopMoving(action) {
  if (moveTimers[action]) {
    clearInterval(moveTimers[action]);
    delete moveTimers[action];
  }
}

const controlMapping = [
  { id: 'btnUp', action: 'moveUp' },
  { id: 'btnDown', action: 'moveDown' },
  { id: 'btnForward', action: 'moveForward' },
  { id: 'btnBackward', action: 'moveBackward' },
  { id: 'btnLeft', action: 'moveLeft' },
  { id: 'btnRight', action: 'moveRight' }
];

controlMapping.forEach(mapping => {
  const el = document.getElementById(mapping.id);
  if (el) {
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); startMoving(mapping.action); });
    el.addEventListener('pointerup', () => stopMoving(mapping.action));
    el.addEventListener('pointerleave', () => stopMoving(mapping.action));
  }
});

// =============================================
//  GAS連携・各種UIイベント・オートプレイ
// =============================================
async function fetchDriveFileList() {
  const select = document.getElementById('driveFileSelect'); select.innerHTML = '<option value="">⏳ 取得中...</option>';
  try {
    const res = await fetch(GAS_URL); driveFiles = await res.json(); select.innerHTML = '';
    if (driveFiles.length === 0) return select.innerHTML = '<option value="">ファイルなし</option>';
    driveFiles.forEach((f, i) => select.add(new Option(f.name, i))); setDriveStatus('GAS同期完了');
  } catch (e) { select.innerHTML = '<option value="">通信エラー</option>'; setDriveStatus('GASエラー'); }
}

document.getElementById('btnLoadDrive').addEventListener('click', async () => {
  const idx = parseInt(document.getElementById('driveFileSelect').value); if (isNaN(idx)) return;
  const btn = document.getElementById('btnLoadDrive'); btn.innerText = "⏳ 読込中"; btn.disabled = true;
  try {
    const res = await fetch(`${GAS_URL}?fileId=${driveFiles[idx].id}`); const data = await res.json();
    if (data.success) { currentIndex = idx; saveNewFile(driveFiles[idx].name, data.html); renderToIframe(data.html, driveFiles[idx].name); }
  } catch (e) {} finally { btn.innerText = "☁️ 開く"; btn.disabled = false; }
});

document.getElementById('btnSaveDrive').addEventListener('click', async () => {
  if (!activeFile) return; const code = document.getElementById('codeEditor').value; files[activeFile] = code; saveStorage();
  let action = "update", saveName = activeFile;
  if (!confirm(`ドライブの「${activeFile}」を上書きしますか？`)) { action = "create"; saveName = prompt("新規ファイル名", activeFile); if (!saveName) return; if (!saveName.endsWith('.html')) saveName += '.html'; }
  const btn = document.getElementById('btnSaveDrive'); btn.innerText = "⏳ 保存中"; btn.disabled = true;
  try {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, fileName: saveName, content: code }) }); const data = await res.json();
    if (data.success) { alert("保存成功"); if(action==="create") saveNewFile(saveName, code); fetchDriveFileList(); }
  } catch (e) {} finally { btn.innerText = "☁️ 保存"; btn.disabled = false; }
});

async function playIndexFile(idx) {
  if (!driveFiles[idx]) return; document.getElementById('osd-filename').innerText = `⏳ 読込中: ${driveFiles[idx].name}`;
  try {
    const res = await fetch(`${GAS_URL}?fileId=${driveFiles[idx].id}`); const data = await res.json();
    if (data.success) { currentIndex = idx; document.getElementById('driveFileSelect').value = idx; saveNewFile(driveFiles[idx].name, data.html); renderToIframe(data.html, driveFiles[idx].name); }
  } catch (e) { document.getElementById('osd-filename').innerText = "❌ エラー"; }
}
function playNextFile() { if (driveFiles.length === 0) return; let n = currentIndex + 1; if (n >= driveFiles.length) n = 0; playIndexFile(n); }
document.getElementById('btnNext').addEventListener('click', () => { playNextFile(); if (isAutoPlay) { clearInterval(autoPlayTimer); autoPlayTimer = setInterval(playNextFile, AUTOPLAY_INTERVAL); } });
document.getElementById('btnAutoPlay').addEventListener('click', (e) => {
  isAutoPlay = !isAutoPlay; const btn = e.target;
  if (isAutoPlay) { btn.classList.add('active-mode'); btn.innerText = "🔄 プレイ中"; playNextFile(); autoPlayTimer = setInterval(playNextFile, AUTOPLAY_INTERVAL); } 
  else { btn.classList.remove('active-mode'); btn.innerText = "🔄 オートプレイ"; clearInterval(autoPlayTimer); }
});

document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('toolbar').classList.toggle('hidden'));
document.getElementById('btnToggleEditor').addEventListener('click', () => document.getElementById('editor-panel').classList.toggle('hidden'));
document.getElementById('btnCopy').addEventListener('click', () => navigator.clipboard.writeText(document.getElementById('codeEditor').value).then(() => alert("コピーしました")));
document.getElementById('btnPreview').addEventListener('click', () => { const code = document.getElementById('codeEditor').value; if(activeFile){ files[activeFile] = code; saveStorage(); } renderToIframe(code); });
document.getElementById('btnNewFile').addEventListener('click', () => { let n = prompt('ファイル名', 'new.html'); if(n){ if(!n.endsWith('.html')) n+='.html'; saveNewFile(n, '<!DOCTYPE html>\n<html><body></body></html>'); }});
document.getElementById('btnSaveNew').addEventListener('click', () => { let n = prompt('ファイル名', 'my.html'); if(n){ if(!n.endsWith('.html')) n+='.html'; saveNewFile(n, document.getElementById('codeEditor').value); }});
document.getElementById('btnOverwrite').addEventListener('click', () => { files[activeFile] = document.getElementById('codeEditor').value; saveStorage(); setStatus("上書き完了", "status-ok"); });

document.getElementById('btnLoadSample').addEventListener('click', () => { const key = document.getElementById('sampleSelect').value; if (!key) return; const name = document.getElementById('sampleSelect').options[document.getElementById('sampleSelect').selectedIndex].text + '.html'; saveNewFile(name, SAMPLES[key]); renderToIframe(SAMPLES[key]); });
