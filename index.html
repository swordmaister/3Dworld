<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D HTML Player</title>
  <style>
    /* 全体のレイアウト */
    body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a1a; color: white; overflow: hidden; }
    
    /* 上部のヘッダー（メニュー呼び出しボタン） */
    #header { padding: 10px; background: #222; display: flex; align-items: center; z-index: 100; position: relative; }
    #menuToggle { background: #444; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-size: 16px; }
    #menuToggle:hover { background: #555; }
    
    /* 操作メニュー（折りたたみ可能） */
    #toolbar { padding: 10px; background: #333; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #444; transition: all 0.3s; z-index: 90; position: relative; }
    .hidden { display: none !important; }
    
    select, button, input { padding: 8px 12px; font-size: 14px; border-radius: 4px; border: none; cursor: pointer; }
    select { background: #fff; color: #000; }
    button { background: #007bff; color: white; font-weight: bold; }
    button:hover { background: #0056b3; }
    button:disabled { background: #555; cursor: not-allowed; }

    /* 保存系ボタンの色分け */
    #btnCopy { background: #28a745; } #btnCopy:hover { background: #1e7e34; }
    #btnOverwrite { background: #dc3545; } #btnOverwrite:hover { background: #c82333; }
    #btnSaveAs { background: #ffc107; color: #000; } #btnSaveAs:hover { background: #e0a800; }

    /* 3Dを表示するエリア */
    #viewer-container { flex: 1; position: relative; width: 100%; }
    .viewer-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #000; }

    /* コントロールボタン（上昇・下降） */
    #touchControls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
    .ctrl-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white; padding: 15px 20px; border-radius: 50px; font-size: 16px; backdrop-filter: blur(5px); transition: 0.2s; }
    .ctrl-btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.95); }
  </style>
</head>
<body>

  <div id="header">
    <button id="menuToggle">☰ メニュー</button>
  </div>

  <div id="toolbar">
    <select id="fileSelect">
      <option value="">Googleドライブと通信中...</option>
    </select>
    <button id="btnPlay">▶ 表示</button>
    <button id="btnCopy" disabled>📋 コピー</button>
    <button id="btnOverwrite" disabled>💾 上書き保存</button>
    <button id="btnSaveAs" disabled>📝 名前をつけて保存</button>
  </div>

  <div id="viewer-container">
    <iframe id="iframeA" class="viewer-frame"></iframe>
    
    <div id="touchControls">
      <button id="btnUp" class="ctrl-btn">▲ 上昇</button>
      <button id="btnDown" class="ctrl-btn">▼ 下降</button>
    </div>
  </div>

  <script>
    // あなたのGASのURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzj54N3di_L0kSqrqSo0M8XCWbboID34OB2FcPChr9ss1SPp5NRbMfDbKPH2PezsEhzcA/exec";

    // アプリの状態を管理する変数
    let currentHtml = "";
    let currentFileName = "";

    // メニューの表示・非表示切り替え
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('toolbar').classList.toggle('hidden');
    });

    // 起動時にファイルリストを取得
    async function fetchFileList() {
      try {
        const response = await fetch(GAS_URL);
        const files = await response.json();
        
        const select = document.getElementById('fileSelect');
        select.innerHTML = ''; 
        
        if (files.length === 0) {
          select.innerHTML = '<option value="">HTMLファイルが見つかりません</option>';
          return;
        }

        files.forEach(file => {
          const option = document.createElement('option');
          option.value = file.id; 
          option.text = file.name; 
          select.appendChild(option);
        });

      } catch (error) {
        console.error("エラー:", error);
        document.getElementById('fileSelect').innerHTML = '<option value="">読み込みエラー</option>';
      }
    }

    // 「▶ 表示」ボタン
    document.getElementById('btnPlay').addEventListener('click', async () => {
      const select = document.getElementById('fileSelect');
      const fileId = select.value;
      if (!fileId) return alert("ファイルが選択されていません");

      // 選択されているファイル名を取得して保存しておく
      currentFileName = select.options[select.selectedIndex].text;

      const btn = document.getElementById('btnPlay');
      btn.innerText = "⏳ 読み込み中...";
      btn.disabled = true;

      try {
        const response = await fetch(`${GAS_URL}?fileId=${fileId}`);
        const data = await response.json();

        if (data.success) {
          currentHtml = data.html; // 現在のコードを変数に保持
          
          // iframeに書き込み
          const iframe = document.getElementById('iframeA');
          const doc = iframe.contentWindow.document;
          doc.open();
          doc.write(currentHtml);
          doc.close();

          // 保存系ボタンを有効化
          document.getElementById('btnCopy').disabled = false;
          document.getElementById('btnOverwrite').disabled = false;
          document.getElementById('btnSaveAs').disabled = false;
        } else {
          alert("ファイルの取得に失敗しました: " + data.message);
        }
      } catch (error) {
        console.error("エラー:", error);
        alert("通信エラーが発生しました");
      } finally {
        btn.innerText = "▶ 表示";
        btn.disabled = false;
      }
    });

    // 「📋 コピー」ボタン
    document.getElementById('btnCopy').addEventListener('click', () => {
      if (!currentHtml) return;
      navigator.clipboard.writeText(currentHtml).then(() => {
        alert("HTMLコードをクリップボードにコピーしました！");
      }).catch(err => {
        alert("コピーに失敗しました: " + err);
      });
    });

    // 「💾 上書き保存」ボタン
    document.getElementById('btnOverwrite').addEventListener('click', async () => {
      if (!currentHtml || !currentFileName) return;
      
      if (!confirm(`「${currentFileName}」を上書き保存しますか？\n（Googleドライブのデータが更新されます）`)) return;

      await saveToDrive(currentFileName, currentHtml, "update");
    });

    // 「📝 名前をつけて保存」ボタン
    document.getElementById('btnSaveAs').addEventListener('click', async () => {
      if (!currentHtml) return;
      
      const newFileName = prompt("新しいファイル名を入力してください。\n（例: new_scene.html）", currentFileName);
      if (!newFileName) return; // キャンセルされた場合

      // 拡張子 .html がなければ付与
      const finalFileName = newFileName.endsWith('.html') ? newFileName : newFileName + '.html';

      await saveToDrive(finalFileName, currentHtml, "create");
      
      // 保存成功後、リストを再取得して最新化する
      fetchFileList();
    });

    // GASへ保存リクエストを送る共通関数
    async function saveToDrive(fileName, content, action) {
      try {
        const payload = { action: action, fileName: fileName, content: content };
        
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
        
        const result = await response.json();
        if (result.success) {
          alert("保存成功: " + result.message);
        } else {
          alert("保存エラー: " + result.message);
        }
      } catch (error) {
        console.error("保存通信エラー:", error);
        alert("保存のための通信に失敗しました。");
      }
    }

    // 上昇・下降ボタン（今回はタッチ判定のテスト用。後で3Dと連携させます）
    document.getElementById('btnUp').addEventListener('pointerdown', () => {
      console.log("上昇ボタンが押されました");
    });
    document.getElementById('btnDown').addEventListener('pointerdown', () => {
      console.log("下降ボタンが押されました");
    });

    // 起動処理
    window.onload = fetchFileList;
  </script>
</body>
</html>
