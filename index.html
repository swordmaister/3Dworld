<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D HTML Viewer & AutoPlayer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a2e; color: #e0e0e0; overflow: hidden; }

    /* ヘッダー＆ツールバー（前回同様） */
    #header { padding: 8px 14px; background: #16213e; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    #header h1 { font-size: 15px; color: #e94560; font-weight: 700; }
    #menuToggle { background: #0f3460; color: #e0e0e0; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #toolbar { background: #16213e; padding: 10px 14px; border-bottom: 1px solid #0f3460; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    #toolbar.hidden { display: none; }
    .toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    select, textarea { background: #0f3460; color: #e0e0e0; border: 1px solid #e9456055; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
    button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-primary { background: #e94560; color: #fff; } .btn-secondary { background: #0f3460; color: #e0e0e0; border: 1px solid #e9456055; }
    .btn-fs { background: #6f42c1; color: #fff; } .btn-drive { background: #4285F4; color: #fff; }
    
    /* エディタエリア */
    #main { flex: 1; display: flex; overflow: hidden; }
    #editor-panel { width: 40%; min-width: 250px; display: flex; flex-direction: column; border-right: 2px solid #e94560; resize: horizontal; overflow: auto; }
    #editor-panel.hidden { display: none; }
    #codeEditor { flex: 1; padding: 12px; font-family: 'Courier New', monospace; font-size: 13px; background: #0a0e1a; color: #e0e0e0; border: none; resize: none; outline: none; }

    /* ビューワーエリア（ダブルバッファリング用） */
    #viewer-container { flex: 1; position: relative; background: #000; overflow: hidden; }
    
    /* 2つのiframeを重ねる。非アクティブな方は透明にして裏で読み込ませる */
    .viewer-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.8s ease-in-out; pointer-events: none; }
    .viewer-frame.active { opacity: 1; pointer-events: auto; z-index: 10; }
    
    #viewer-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; z-index: 5; }

    /* ★ フルスクリーン＆iPhone対応のオーバーレイUI ★ */
    #overlay-ui { position: absolute; inset: 0; pointer-events: none; z-index: 50; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
    
    /* 上部：ファイル名表示とオートプレイ状態 */
    .overlay-top { display: flex; justify-content: space-between; pointer-events: auto; }
    .overlay-title { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 14px; backdrop-filter: blur(4px); }
    
    /* 下部：コントロールボタン群 */
    .overlay-bottom { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto; }
    .playback-controls { display: flex; gap: 10px; }
    .overlay-btn { background: rgba(0,0,0,0.6); border: 1px solid #aaa; color: white; padding: 12px 18px; border-radius: 30px; font-size: 16px; backdrop-filter: blur(4px); transition: 0.2s; }
    .overlay-btn:active { background: rgba(233, 69, 96, 0.8); }
    .overlay-btn.active-mode { background: rgba(40, 167, 69, 0.8); border-color: #28a745; } /* オートプレイON時の色 */

    /* 右下：タッチカメラ操作 */
    .camera-controls { display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>

<div id="header">
  <h1>🎮 3D Viewer & AI Editor</h1>
  <button id="menuToggle">☰ メニュー</button>
  <button class="btn-secondary" id="btnToggleEditor">◧ エディタ</button>
  <button class="btn-fs" id="btnFullscreen">⛶ フルスクリーン</button>
</div>

<div id="toolbar">
  <div class="toolbar-row">
    <button class="btn-drive" id="btnLoadDriveList">☁️ ドライブ読込</button>
    <select id="driveFileSelect" style="flex:1;"><option value="">ドライブ未接続</option></select>
    <button class="btn-primary" id="btnPlaySelected">▶ 選択して表示</button>
  </div>
</div>

<div id="main">
  <div id="editor-panel">
    <textarea id="codeEditor" placeholder="現在表示中のコード（プレビュー・編集可能）"></textarea>
    <button class="btn-secondary" id="btnPreview" style="margin:5px;">🔄 プレビュー更新</button>
  </div>

  <div id="viewer-container">
    <div id="viewer-placeholder">ドライブからファイルを読み込んでください</div>
    
    <iframe id="iframeA" class="viewer-frame" allow="xr-spatial-tracking; fullscreen; accelerometer; gyroscope; magnetometer; camera; microphone"></iframe>
    <iframe id="iframeB" class="viewer-frame" allow="xr-spatial-tracking; fullscreen; accelerometer; gyroscope; magnetometer; camera; microphone"></iframe>
    
    <div id="overlay-ui">
      <div class="overlay-top">
        <div id="osd-filename" class="overlay-title">---</div>
      </div>
      <div class="overlay-bottom">
        <div class="playback-controls">
          <button id="btnAutoPlay" class="overlay-btn">🔄 オートプレイ</button>
          <button id="btnNext" class="overlay-btn">⏭ 次へ</button>
        </div>
        <div class="camera-controls">
          <button id="btnUp" class="overlay-btn">▲ 上昇</button>
          <button id="btnDown" class="overlay-btn">▼ 下降</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// =============================================
//  設定と状態管理
// =============================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzj54N3di_L0kSqrqSo0M8XCWbboID34OB2FcPChr9ss1SPp5NRbMfDbKPH2PezsEhzcA/exec";

let driveFiles = [];        // ドライブのファイルリスト
let currentIndex = -1;      // 現在再生中のインデックス
let isAutoPlay = false;     // オートプレイ状態
let autoPlayTimer = null;   // タイマーID
const AUTOPLAY_INTERVAL = 15000; // 15秒で次のファイルへ

let activeIframeId = 'iframeA'; // 現在表示しているiframe ('iframeA' or 'iframeB')

// =============================================
//  UIイベント（メニュー、フルスクリーン）
// =============================================
document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('toolbar').classList.toggle('hidden'));
document.getElementById('btnToggleEditor').addEventListener('click', () => document.getElementById('editor-panel').classList.toggle('hidden'));

document.getElementById('btnFullscreen').addEventListener('click', () => {
  const viewer = document.getElementById('viewer-container');
  if (!document.fullscreenElement) viewer.requestFullscreen().catch(err => alert(`エラー: ${err.message}`));
  else document.exitFullscreen();
});

// =============================================
//  GAS (Googleドライブ) 連携
// =============================================
document.getElementById('btnLoadDriveList').addEventListener('click', async () => {
  const select = document.getElementById('driveFileSelect');
  select.innerHTML = '<option value="">⏳ 読込中...</option>';
  try {
    const response = await fetch(GAS_URL);
    driveFiles = await response.json();
    select.innerHTML = '';
    if (driveFiles.length === 0) {
      select.innerHTML = '<option value="">ファイルがありません</option>';
      return;
    }
    driveFiles.forEach((file, index) => {
      const option = document.createElement('option');
      option.value = index; // インデックスをValueにする
      option.text = file.name;
      select.appendChild(option);
    });
  } catch (error) {
    select.innerHTML = '<option value="">通信エラー</option>';
  }
});

// =============================================
//  シームレス切り替え（ダブルバッファリング）処理
// =============================================

// 指定したインデックスのファイルを裏側のiframeに読み込み、完了したら表に出す
async function loadAndCrossfade(index) {
  if (index < 0 || index >= driveFiles.length) return;
  
  // OSD（画面上部）にファイル名を表示
  document.getElementById('osd-filename').innerText = `⏳ 読込中: ${driveFiles[index].name}`;
  
  try {
    // 1. GASからコードを取得
    const fileId = driveFiles[index].id;
    const response = await fetch(`${GAS_URL}?fileId=${fileId}`);
    const data = await response.json();
    
    if (data.success) {
      // 2. コントローラー用スクリプトを注入
      const injectionScript = `
      <script>
        window.addEventListener('message', (e) => {
          const action = e.data.action;
          const afCam = document.querySelector('a-camera, [camera]');
          if (afCam && afCam.object3D) afCam.object3D.position.y += (action === 'moveUp' ? 0.5 : -0.5);
          if (window.camera && window.camera.position) window.camera.position.y += (action === 'moveUp' ? 5 : -5);
        });
      <\/script></body>`;
      const htmlCode = data.html.replace(/<\/body>/i, injectionScript);
      
      // エディタにも反映
      document.getElementById('codeEditor').value = data.html;
      
      // 3. 次に使う（現在裏側にいる）iframeを決定
      const nextIframeId = (activeIframeId === 'iframeA') ? 'iframeB' : 'iframeA';
      const nextIframe = document.getElementById(nextIframeId);
      const currentIframe = document.getElementById(activeIframeId);

      // 古いBlobURLがあれば解放
      if (nextIframe.src && nextIframe.src.startsWith('blob:')) {
        URL.revokeObjectURL(nextIframe.src);
      }

      // 4. 裏側のiframeにBlobとして流し込む
      const blob = new Blob([htmlCode], { type: 'text/html' });
      nextIframe.src = URL.createObjectURL(blob);
      
      // 5. 読み込み完了を待ってからクロスフェード（フェードイン/アウト）
      nextIframe.onload = () => {
        document.getElementById('viewer-placeholder').classList.add('hidden');
        document.getElementById('osd-filename').innerText = driveFiles[index].name; // 完了
        
        // CSSクラスを切り替えてフェード
        nextIframe.classList.add('active');
        currentIframe.classList.remove('active');
        
        // アクティブなIDを更新
        activeIframeId = nextIframeId;
        currentIndex = index; // 現在地を更新
        document.getElementById('driveFileSelect').value = index; // セレクトボックスも連動
      };
      
    }
  } catch (err) {
    console.error("読込エラー", err);
    document.getElementById('osd-filename').innerText = "❌ 読込エラー";
  }
}

// ツールバーの「選択して表示」ボタン
document.getElementById('btnPlaySelected').addEventListener('click', () => {
  const select = document.getElementById('driveFileSelect');
  const index = parseInt(select.value, 10);
  if (!isNaN(index)) loadAndCrossfade(index);
});

// エディタのプレビュー更新（現在アクティブなiframeに直接上書き）
document.getElementById('btnPreview').addEventListener('click', () => {
  const code = document.getElementById('codeEditor').value;
  const currentIframe = document.getElementById(activeIframeId);
  const blob = new Blob([code], { type: 'text/html' });
  currentIframe.src = URL.createObjectURL(blob);
});

// =============================================
//  オーバーレイUI（次へ / オートプレイ）
// =============================================

function playNextFile() {
  if (driveFiles.length === 0) return;
  let nextIndex = currentIndex + 1;
  if (nextIndex >= driveFiles.length) nextIndex = 0; // 最後まで行ったらループ
  loadAndCrossfade(nextIndex);
}

// 「⏭ 次へ」ボタン
document.getElementById('btnNext').addEventListener('click', () => {
  playNextFile();
  // 手動で次へを押したときはタイマーをリセット
  if (isAutoPlay) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = setInterval(playNextFile, AUTOPLAY_INTERVAL);
  }
});

// 「🔄 オートプレイ」ボタン
document.getElementById('btnAutoPlay').addEventListener('click', (e) => {
  isAutoPlay = !isAutoPlay;
  const btn = e.target;
  
  if (isAutoPlay) {
    btn.classList.add('active-mode');
    btn.innerText = "🔄 オートプレイ中";
    // 15秒ごとにプレイ
    autoPlayTimer = setInterval(playNextFile, AUTOPLAY_INTERVAL);
  } else {
    btn.classList.remove('active-mode');
    btn.innerText = "🔄 オートプレイ";
    clearInterval(autoPlayTimer);
  }
});

// =============================================
//  タッチカメラ操作
// =============================================
function sendCameraCommand(action) {
  const iframe = document.getElementById(activeIframeId);
  if (iframe.contentWindow) iframe.contentWindow.postMessage({ action: action }, '*');
}
document.getElementById('btnUp').addEventListener('pointerdown', () => sendCameraCommand('moveUp'));
document.getElementById('btnDown').addEventListener('pointerdown', () => sendCameraCommand('moveDown'));

</script>
</body>
</html>
